AllCops:
  NewCops: enable
  TargetRubyVersion: 3.4.8
  Exclude:
    - "vendor/**/*"
    - "spec/fixtures/**/*"
    - "tmp/**/*"
    - ".git/**/*"
    - "bin/*"
    - "db/schema.rb"
    - "db/queue_schema.rb"
    - "config/routes.rb"

Layout/IndentationWidth:
  Width: 2

Style/Documentation:
  Enabled: false

Layout/LineLength:
  Max: 120
Style/StringLiterals:
  EnforcedStyle: single_quotes
Style/FrozenStringLiteralComment:
  Enabled: true

Style/IfUnlessModifier:
  Enabled: true
Metrics/MethodLength:
  Max: 20
plugins:
  - rubocop-rails

Metrics/BlockLength:
  Exclude:
    - "spec/**/*"

Rails:
  DocumentationBaseURL: https://docs.rubocop.org/rubocop-rails
Rails/TimeZone:
  StyleGuide: "#time"
